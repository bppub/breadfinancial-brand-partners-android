name: Run Unit Test

on:
  pull_request:
    branches:
      - master

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew createDebugUnitTestCoverageReport

      - name: Publish Test Report Dashboard
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'BreadPartnersSDK/build/test-results/testDebugUnitTest/TEST-*.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          detailed_summary: true
          include_passed: true

      - name: Upload html test report
        uses: actions/upload-artifact@v4
        with:
          name: index.html
          path: BreadPartnersSDK/build/reports/tests/testDebugUnitTest/index.html

      - name: Publish Test Results
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: BreadPartnersSDK/build/reports/coverage/test/debug/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "📊 Android App Code Coverage"

      - name: Publish Unit Test Results 2
        uses: pooi/coverage-comment@1.0.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          xml-test-report-path: ${SOURCE_PATH}BreadPartnersSDK/build/reports/coverage/test/debug/report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/**/*.xml'

