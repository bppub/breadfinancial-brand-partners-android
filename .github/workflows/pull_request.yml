name: Run Unit Test

on:
  pull_request:
    branches:
      - master

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew createDebugUnitTestCoverageReport

      - name: Publish Test Results
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: BreadPartnersSDK/build/reports/coverage/test/debug/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "📊 Android App Code Coverage"

      - name: Publish Unit Test Results 2
        uses: pooi/coverage-comment@1.0.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          xml-test-report-path: ${SOURCE_PATH}BreadPartnersSDK/build/reports/coverage/test/debug/report.xml

